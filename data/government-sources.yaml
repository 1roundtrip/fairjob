# 通用CSS选择器配置（用于这些政府网站）
# 大多数政府网站的就业频道使用类似结构
cssSelectors:
  jobList: 
    - "table.list tr"
    - "ul.news-list li"
    - "div.job-list .item"
    - "div.recruit-item"
    - "table tr:has(a[href*='job'])"

  jobTitle:
    - "td:nth-child(2) a"
    - ".title a"
    - "h3 a"
    - ".job-name"
    - "a[href*='detail']"

  companyName:
    - "td:nth-child(3)"
    - ".company"
    - ".company-name"
    - "span.company"

  location:
    - "td:nth-child(4)"
    - ".city"
    - ".location"
    - ".area"

  salary:
    - "td:nth-child(5)"
    - ".salary"
    - ".pay"
    - ".wage"

  education:
    - "td:nth-child(6)"
    - ".edu"
    - ".education"
    - ".require"

  publishDate:
    - "td:nth-child(7)"
    - ".date"
    - ".publish-date"
    - ".time"

  detailLink:
    - "a[href*='detail']"
    - "a[href*='job']"
    - "td:nth-child(2) a"

# 重点关键词（用于筛选专科相关岗位）
vocationalKeywords:
  - "专科"
  - "大专"
  - "高职"
  - "技校"
  - "中职"
  - "中专"
  - "高专"
  - "职业技术学院"
  - "不限学历"
  - "学历不限"
