name: FairJob Scheduled Tasks

# GitHub Actions 定时任务
# 中国时间 (UTC+8):
#   - 每半小时数据刷新 (5:00 - 22:00)  →  UTC 21:00-23:59 + 0:00-14:00
#   - 每天凌晨 3:05 学历回填             →  UTC 19:05
#   - 每天凌晨 4:10 去重清理             →  UTC 20:10
#   - 每天上午 9:10 网申截止提醒         →  UTC 1:10

on:
  schedule:
    # 每半小时数据刷新（中国 5:00-7:59 对应 UTC 21:00-23:59）
    - cron: "0,30 21-23 * * *"

    # 每半小时数据刷新（中国 8:00-22:00 对应 UTC 0:00-14:00）
    - cron: "0,30 0-14 * * *"

    # 每天凌晨 3:05 学历回填（中国时间，对应 UTC 19:05）
    - cron: "5 19 * * *"

    # 每天凌晨 4:10 去重清理（中国时间，对应 UTC 20:10）
    - cron: "10 20 * * *"

    # 每天上午 9:10 网申截止提醒（中国时间，对应 UTC 1:10）
    - cron: "10 1 * * *"

  # 可手动触发（GitHub Actions 页面 → Workflows → FairJob Scheduled Tasks → Run workflow）
  workflow_dispatch:
    inputs:
      task:
        description: "选择要运行的任务"
        required: true
        default: "refresh"
        type: choice
        options:
          - refresh
          - migrate
          - crawl
          - backfill
          - cleanup
          - reminder
          - full

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
  BING_SEARCH_API_KEY: ${{ secrets.BING_SEARCH_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}
  BARK_WEBHOOK_URL: ${{ secrets.BARK_WEBHOOK_URL }}
  SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
  DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
  APP_URL: ${{ secrets.APP_URL }}

jobs:
  migrate:
    name: 数据库迁移
    if: |
      github.event.inputs.task == 'migrate' ||
      github.event.inputs.task == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run migration
        run: npx tsx scripts/migrate-turso.ts
        env:
          TURSO_URL: ${{ secrets.DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

  refresh:
    name: 半小时数据刷新
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.task == 'refresh' ||
      github.event.inputs.task == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Run refresh
        run: |
          curl -s -X GET "${APP_URL}/api/cron/refresh" \
            -H "Authorization: Bearer ${CRON_SECRET}"
        continue-on-error: true

  crawl:
    name: 增量抓取
    if: github.event.inputs.task == 'crawl' || github.event.inputs.task == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Run crawl
        run: |
          curl -s -X GET "${APP_URL}/api/cron/incremental-crawl" \
            -H "Authorization: Bearer ${CRON_SECRET}"
        continue-on-error: true

  backfill:
    name: 学历回填
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '5 19 * * *') ||
      github.event.inputs.task == 'backfill' ||
      github.event.inputs.task == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Run backfill
        run: |
          curl -s -X GET "${APP_URL}/api/cron/education-backfill" \
            -H "Authorization: Bearer ${CRON_SECRET}"
        continue-on-error: true

  cleanup:
    name: 去重与清理
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '10 20 * * *') ||
      github.event.inputs.task == 'cleanup' ||
      github.event.inputs.task == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Run cleanup
        run: |
          curl -s -X GET "${APP_URL}/api/cron/cleanup" \
            -H "Authorization: Bearer ${CRON_SECRET}"
        continue-on-error: true

  reminder:
    name: 网申截止提醒
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '10 1 * * *') ||
      github.event.inputs.task == 'reminder' ||
      github.event.inputs.task == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Run reminder
        run: |
          curl -s -X GET "${APP_URL}/api/cron/deadline-reminder" \
            -H "Authorization: Bearer ${CRON_SECRET}"
        continue-on-error: true
